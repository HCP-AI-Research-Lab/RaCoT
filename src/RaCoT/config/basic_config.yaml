model2path:
  e5: "intfloat/e5-base-v2"
  bge: "BAAI/bge-base-en-v1.5"
  contriever: "facebook/contriever"
  llama2-7B-chat: "meta-llama/Llama-2-7b-chat-hf"
  llama2-7B: "meta-llama/Llama-2-7b-hf"
  llama2-13B: "meta-llama/Llama-2-13b-hf"
  llama2-13B-chat: "meta-llama/Llama-2-13b-chat-hf"

model2pooling:
  e5: "mean"
  bge: "cls"
  contriever: "mean"
  jina: "mean"
  dpr: "pooler"

method2index:
  e5: ~
  bm25: ~
  contriever: ~
  clip:
    "text": "path/to/text_index"
    "image": "path/to/image_index"

data_dir: "dataset/"
save_dir: "output/"

gpu_id: "0,1,2,3"
dataset_name: "nq"
split: ["test"]

test_sample_num: ~
random_sample: False

seed: 2024

save_intermediate_data: True
save_note: "experiment"
is_reasoning: false

retrieval_method: "e5"
retrieval_model_path: ~
index_path: ~
multimodal_index_path_dict: ~
faiss_gpu: False
corpus_path: ~

instruction: ~
retrieval_topk: 5
retrieval_batch_size: 256
retrieval_use_fp16: True
retrieval_query_max_length: 128
save_retrieval_cache: False
use_retrieval_cache: False
retrieval_cache_path: ~
retrieval_pooling_method: ~
bm25_backend: bm25s
use_sentence_transformer: False
silent_retrieval: True

seismic_query_cut: 10
seismic_heap_factor: 0.8
use_reranker: False
rerank_model_name: ~
rerank_model_path: ~
rerank_pooling_method: ~
rerank_topk: 5
rerank_max_length: 512
rerank_batch_size: 256
rerank_use_fp16: True

use_multi_retriever: False
multi_retriever_setting:
  merge_method: "concat"
  topk: 5
  rerank_model_name: ~
  rerank_model_path: ~
  retriever_list:
    - retrieval_method: "e5"
      retrieval_topk: 5
      index_path: ~
      retrieval_model_path: ~
    - retrieval_method: "bm25"
      retrieval_topk: 5
      index_path: ~
      retrieval_model_path: ~

framework: fschat
generator_model: "llama3-8B-instruct"
openai_setting:
  api_key: ~
  base_url: ~

generator_model_path: ~
generator_max_input_len: 1024
generator_batch_size: 4
generation_params:
  max_tokens: 32
use_fid: False
gpu_memory_utilization: 0.85

metrics: ["em", "f1", "acc", "precision", "recall", "input_tokens"]

metric_setting:
  retrieval_recall_topk: 5
  tokenizer_name: "gpt-4"
save_metric_score: True

open_racot: False
racot_num_candidates: 3
racot_similarity_min: 0.8
racot_similarity_max: 0.95
racot_filter_threshold: 0.7
racot_enable_filtering: True
racot_inject_delta_to_generation: True
racot_use_llm: True
racot_model_name_or_path: ~
racot_max_new_tokens: 128
